<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="container"></div>
    <script>
        let newpara= document.createElement("h1");
        newpara.textContent="This is a paragraph";
        newpara.style="color:#36B";
        document.getElementById("container").appendChild(newpara);
        setTimeout(()=>{
            newpara.textContent="Updates text! Hello Thendral!";
            newpara.style="color:violet";
        },2000);
        setTimeout(()=>{
            container.removeChild(newpara);
        }, 4000);
    </script>

    <div id="container1"></div>
    <button onclick="display()">click to create </button>
    <script>
        function display(){
            let t=document.createElement("h3");
            t.id="id"
            t.textContent="Creating An Element...."
            t.style="color=crimson;"
            document.getElementById("container1").appendChild(t); 
        }
    </script>

    
    <button onclick="display1()">click to update </button>
    <script>
        function display1(){
            document.getElementById("id").textContent="Updated text....";
        }
    </script>

    <button onclick="display2()">Click to delete</button>
    <script>
        function display2(){
            id.remove();
        }
    </script>
</body>
</html>
