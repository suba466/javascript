<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h4>IF LOOP:</h4>
    <input type="number" name="num" id="num" placeholder="Enter a number:">
    <button onclick="checkIf()">Check</button>
    <p id="result"></p>

    <h4>IF-ELSE LOOP:</h4>
    <input type="number" name="num1" id="num1" placeholder="Enter a number:">
    <button onclick="checkIfelse()">Check</button>
    <p id="result1"></p>

    <h4>IF-ELSE LADDER LOOP:</h4>
    <input type="number" name="num2" id="num2" placeholder="Enter a number:">
    <button onclick="checkLadd()">Check</button>
    <p id="result2"></p>

    <h4>SWITCH:</h4>
    <input type="number" name="switch1" id="switch1" placeholder="Enter the first number: ">
    <select id="operator">
        <option>+</option>
        <option>-</option>
        <option>*</option>
        <option>/</option>
        <option>%</option>
    </select>
    <input type="number" name="switch2" id="switch2" placeholder="Enter the second number: ">
    <button onclick="Calculate()">Calculate</button>
    <p id="calcResult"></p>

    <h4>FOR LOOP:</h4>
    <input type="number" name="forLoop" id="forLoop" placeholder="Enter the number:">
    <button onclick="multiply()">Calculate</button>
    <ul id="calcResult1"></ul>

    <h4>WHILE LOOP:</h4>
    <input type="number" name="whileLoop" id="whileLoop" placeholder="Enter the numbers:">
    <button onclick="count()">Count</button>
    <p id="count1"></p>
    <script src="/scriptjs/tasks.js"></script>
</body>
</html>
