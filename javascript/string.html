     <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5fa;
      padding: 20px;
    }
    .task {
      background: #fff;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px #ccc;
    }
    input[type="text"] {
      width: 80%;
      padding: 8px;
      font-size: 16px;
      margin-bottom: 10px;
    }
    button {
      padding: 8px 15px;
      font-size: 16px;
      cursor: pointer;
      background-color: #6a5acd;
      color: white;
      border: none;
      border-radius: 5px;
    }
    .output {
      margin-top: 10px;
      font-weight: bold;
      color: #333;
    }
  </style>
</head>
<body>

  <h2>🌟 JavaScript String Tasks</h2>

  <!-- Task 1: Convert to Lowercase -->
  <div class="task">
    <h3>1. Convert to Lowercase</h3>
    <input type="text" id="input1" placeholder="Enter text here..." />
    <button onclick="toLowercase()">Convert</button>
    <div class="output" id="output1"></div>
  </div>

  <!-- Task 2: Replace 'fun' with 'awesome' -->
  <div class="task">
    <h3>2. Replace 'fun' with 'awesome'</h3>
    <input type="text" id="input2" placeholder="Enter text here..." />
    <button onclick="replaceFun()">Replace</button>
    <div class="output" id="output2"></div>
  </div>

  <script>
    function toLowercase() {
      let input = document.getElementById("input1").value;
      document.getElementById("output1").innerText = input.toLowerCase();
    }

    function replaceFun() {
      const input = document.getElementById("input2").value;
      const output = input.replace("fun", "awesome");
      document.getElementById("output2").innerText = output;
    }
  </script>
</body>
</html>
