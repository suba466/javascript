<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://fonts.googleapis.com/css2?family=Courgette&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js" integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="/scriptjs/set1.css">
</head>
<body>
    <h2 style="text-align: center;">JAVA SCRIPT TASK 1</h2><br>
    <div class="container"><br>
        <h4>1.Reverse Word:</h4>
        <input type="text" id="input1" placeholder="Enter text..">
        <button onclick="reverse()">Output</button>
        <div class="output" id="output1"></div><br>

        <h4>2.Reverse each word:</h4>
        <input type="text" id="input2" placeholder="Enter sentence..">
        <button onclick="reverse1()">Output</button>
        <div class="output" id="output2"></div><br>

        <h4>3.Comparison of two strings:</h4>
        <input type="text" id="input3" placeholder="Enter a string..">
        <input type="text" id="input4" placeholder="Enter a string..">
        <button onclick="compare()">Output</button>
        <div class="output" id="output3"></div><br>

        <h4>4.Count the vowels in a string:</h4>
        <input type="text" id="input5" placeholder="Enter a string..">
        <button onclick="count()">Output</button>
        <div class="output" id="output4"></div><br>

        <h4>5.Check whether strings are anagram:</h4>
        <input type="text" id="input6" placeholder="Enter the string..">
        <input type="text" id="input7" placeholder="Enter the string..">
        <button onclick="check()">Output</button>
        <div class="output" id="output5"></div><br>
        
        <h4>6.Truncating a string:</h4>
        <input type="text" id="input8" placeholder="Enter a string..">
        <input type="number" id="input9" placeholder="Enter the max-length..">
        <button onclick="truncate()">Output</button>
        <div class="output" id="output6"></div><br>

        <h4>7.Replacing characters: </h4>
        <input type="text" id="input10" placeholder="Enter a string..">
        <button onclick="replace()">Output</button>
        <div class="output" id="output7"></div><br>

        <h4>8.Sort strings in alphabetically:</h4>
        <input type="text" id="input11" placeholder="Enter a string.."> 
        <button onclick="sort()">Output</button>
        <div class="output" id="output8"></div><br>

        <h4>9.Count Alphabets</h4>
        <input type="text" id="input12" placeholder="Enter the string..">
        <button onclick="count1()">Output</button>
        <div class="output" id="output9"></div><br>

        <h4>10.Check only alphabets:</h4>
        <input type="text" id="input13" placeholder="Enter the string..">
        <button onclick="check1()">Output</button>
        <div class="output" id="output10"></div><br>
        <script src="/scriptjs/stringtask.js"></script>
    </div>
    
</body>
</html>
