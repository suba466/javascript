<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js" integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="/scriptjs/jsondata.css">
</head>
<body>
    <h3>Product Dashbord</h3><br>
    <div class="container text-center">
        <div class="row mb-3">
            <div class="col-md-3">
                <input type="text" class="form-control" id="searchName" placeholder="Search by name..." oninput="input()"></div>
            <div class="col-md-3">
                <input type="number" class="form-control" id="searchId" placeholder="Search by Id..." oninput="input1()">
            </div>
            <div class="col-md-3">
                <input type="number" class="form-control" id="searchPrice" placeholder="Enter price..." oninput="input2()">
            </div>
            <div class="col-md-3">
                <input type="number" class="form-control" id="searchRating" placeholder="Enter rating..." oninput="input3()">
            </div></div>
            <div class="row mb-3">
            <div class="col-md-2">
                <button class="btn btn-outline-info w-100" onclick="sortAsc()">Sort A-Z</button>
            </div>
            <div class="col-md-2">
                <button class="btn btn-outline-info w-100" onclick="sortDes()">Sort Z-A</button>
            </div>
            <div class="col-md-4">
                <select id="category" class="form-select" onchange="dropdown()">
                    <option value="">Select category</option>
                    <option value="Makeup">Makeup</option>
                    <option value="Hair Care">Hair Care</option>
                    <option value="Mobile Accessories">Mobile Accessories</option>
                </select>
            </div>
            <div class="col-md-4">
                <button class="btn btn-outline-info w-100" onclick="fastDelivery()">Fast delivery</button>
            </div>
        </div>
        <div id="tableContainer" style="display: none;"class="mt-4">
        <table class="table table-hover">
        <thead class="table-dark">
        <tr>
            <th scope="col">Id</th>
            <th scope="col">Name</th>
            <th scope="col">Price</th>
            <th scope="col">Rating</th>
            <th scope="col">Delivery date</th>
            <th scope="col">Category</th>
        </tr>
        </thead>
        <tbody id="productTable"></tbody>
</table></div>
<script src="/scriptjs/jsondata.js"></script>
</div>
</body>
</html>
