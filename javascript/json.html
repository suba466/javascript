<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js" integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="/scriptjs/object.css">
</head>
<body>
    <style>
        body{
            font-family:'Merriweather', serif;
        }
    </style>
    <div id="container">
        <h3 style="text-align: center;">Student data manager</h3><br>
        <h5>Students details:</h5>
        <div id="tableContainer" style="display: none;"class="mt-4">
        <table class="table">
        <thead class="table-dark" >
        <tr >
            <th class="col-sm-1" scope="col" style="text-align: center;">Id:</th>
            <th class="col-sm-6"scope="col" >Name</th>
            <th class="col-sm-6"scope="col">Marks</th>
        </tr>
        </thead>
        <tbody class="table-dark" id="allStudents"></tbody>
        </table></div><br>

        <h5>Search by entering name:</h5>
        <input type="text" id="inputSearch" placeholder="Enter name..">
        <button onclick="Search()">Search</button><div id="output">
        <div id="searchContainer" style="display: none;"class="mt-4">
        <table class="table">
        <thead class="table-dark" >
        <tr >
            <th class="col-sm-1" scope="col" style="text-align: center;">Id:</th>
            <th class="col-sm-6"scope="col" >Name</th>
            <th class="col-sm-6"scope="col">Marks</th>
        </tr>
        </thead>
        <tbody class="table-dark" id="searchStudents"></tbody>
        </table></div></div>
        </div><br>

        <h5>Sort by marks:</h5>
        <button onclick="sortByAcc()">Sort by accending</button>
        <button onclick="sortByDcc()">Sort by decending</button>
        <button onclick="sort()">Sort by alphabets</button>
        <div id="sortContainer" style="display: none;"class="mt-4">
        <table class="table">
        <thead class="table-dark" >
        <tr >
            <th class="col-sm-1" scope="col" style="text-align: center;">Id:</th>
            <th class="col-sm-6"scope="col" >Name</th>
            <th class="col-sm-6"scope="col">Marks</th>
        </tr>
        </thead>
        <tbody class="table-dark" id="sortStudents"></tbody>
        </table></div></div><br>
        </div><br>

        <h5>Delete:</h5>
        <input type="text" id="del" placeholder="Enter name..">
        <button onclick="deleteName()">Delete</button>
        <div id="deleteContainer" style="display: none;"class="mt-4">
        <table class="table">
        <thead class="table-dark" >
        <tr >
            <th class="col-sm-1" scope="col" style="text-align: center;">Id:</th>
            <th class="col-sm-6"scope="col" >Name</th>
            <th class="col-sm-6"scope="col">Marks</th>
        </tr>
        </thead>
        <tbody class="table-dark" id="deleteStudents"></tbody>
        </table></div></div>
        </div><br>
        <script src="/scriptjs/json.js"></script>
    </div>
</body>
</html>
