<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="name">
<p style=" color:red" id="ner"></p>
<button onclick="valids()">click</button>
<script>
    function valids(){
        let n= document.getElementById('name').value 
        let np=document.getElementById('ner')
        let p=/^[a-zA-Z ]{3,20}$/

        if(n==""){
            np.innerHTML="enter your name"
        }else if(!p.test(n)){
            np.innerHTML="enter valid name"
        }
        else{
            np.innerHTML=""
        }
    }
</script>



</body>
</html>
