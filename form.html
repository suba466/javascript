<!DOCTYPE html>
<html lang="en">
<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Document</title>
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js" integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q" crossorigin="anonymous"></script>
      <link rel="stylesheet" href="/scriptjs/form.css">
      <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"> 
</head>
<body>
     <div class="container-sm">
      <h2 style="text-align: center;">APPLICATION FORM</h2>
      <div class="mb-3">
            <label for="form-label">Name:</label>
            <input type="text" class="form-control" placeholder="Your name...."><br>
            <label for="form-label">Date of birth:</label>
            <input type="date" class="form-control"><br>
            <label for="form-label">E-mail:</label>
            <input type="email" class="form-control" placeholder="Your mail id...."><br>
            <label for="form-label">Mobile number:</label>
            <input type="number"class="form-control" placeholder="Your mobile number...."><br>
            <label form="form-label">Create password:</label>
            <input type="password" class="form-control" placeholder="Create password...."><br>
            <label form="form-label">Re-enter password:</label>
            <input type="password" class="form-control" placeholder="Re-enter password...."><br>
            <label for="form-label">Educational Level:</label>
            <select name="education" id="education" class="form-select">
                  <option value="">Select</option>
                  <option>High School or below</option>
                  <option>Undergraduate</option>
                  <option>Postgraduate</option>
                  <option>PhD</option>
            </select><br>
            <label for="form-label">Account Type:</label>
            <select name="account" id="account" class="form-select">
                  <option value="">Select</option>
                  <option>Checking Account</option>
                  <option>Saving Account</option>
                  <option>A Money Marketing A ccount</option>
                  <option>IRA Account</option>
            </select><br>
            <label>Gender:</label>
            <div class="form-check">
                  <input class="form-check-input" type="radio" name="radioDefault" id="radioDefault1">
                  <label class="form-check-label" for="radioDefault1">
                  Male
                  </label>
                  </div>
            <div class="form-check">
                  <input class="form-check-input" type="radio" name="radioDefault" id="radioDefault2" checked>
                  <label class="form-check-label" for="radioDefault2">
                  Female
                  </label>
            </div>
            <div class="form-check">
                  <input class="form-check-input" type="radio" name="radioDefault" id="radioDefault2" checked>
                  <label class="form-check-label" for="radioDefault2">
                  Transgender
                  </label>
            </div><br>
            <label>Service required:</label>
            <div class="form-check">
                  <input class="form-check-input" type="checkbox" value="" id="checkDefault">
                  <label class="form-check-label" for="checkDefault">
                  ATM card
                  </label>
            </div>
            <div class="form-check">
                  <input class="form-check-input" type="checkbox" value="" id="checkChecked" checked>
                  <label class="form-check-label" for="checkChecked">
                 SMS alerts
                  </label>
            </div>
            <div class="form-check">
                  <input class="form-check-input" type="checkbox" value="" id="checkChecked" checked>
                  <label class="form-check-label" for="checkChecked">
                 Net Banking
                  </label>
            </div>
            <div class="form-check">
                  <input class="form-check-input" type="checkbox" value="" id="checkChecked" checked>
                  <label class="form-check-label" for="checkChecked">
                 Checkbook
                  </label>
            </div><br>
            <div class="form-group">
                  <label for="idProof">Upload ID Proof :</label>
                  <input type="file" id="idProof" class="form-control">
            </div>
            <div class="text-center mt-4">
                  <button type="submit" class="btn btn-submit px-4 py-2">Submit</button>
            </div>

      </div>
     </div>
</body>
</html>
