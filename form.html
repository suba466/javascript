<!DOCTYPE html>
<html lang="en">
<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Document</title>
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js" integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q" crossorigin="anonymous"></script>
      <link rel="stylesheet" href="/scriptjs/form.css">
      <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"> 
</head>
<body>
     <div class="container-sm">
      <h2 style="text-align: center;">APPLICATION FORM</h2>
      <div class="mb-3">
            <label for="USERNAME">Name:</label>
            <input type="text" id="USERNAME"class="form-control" placeholder="Your name...." onkeyup="valids()">
            <p id="err"></p>
            <label for="dob">Date of birth:</label>
            <input type="date" id="dob" class="form-control" onchange="valids()">
            <p id="errDob"></p>
            <label for="email">E-mail:</label>
            <input type="email" id="email" class="form-control" placeholder="Your mail id...." onchange="valids()">
            <p id="errEmail"></p>
            <label for="number">Mobile number:</label>
            <input type="number"id="number"class="form-control" placeholder="Your mobile number...." onkeyup="valids()"> 
            <p id="errNum"></p>
            <label form="password">Create password:</label>
            <input type="password" id="password" class="form-control" placeholder="Create password...." onkeyup="valids()">
            <p id="errPass"></p>
            <label form="pass1">Re-enter password:</label>
            <input type="password" id="pass1" class="form-control" placeholder="Re-enter password...." onkeyup="valids()">
            <p id="errPass1"></p>
            <label for="education" >Educational Level:</label>
            <select name="education" id="education" class="form-select" onchange="valids()" >
                  <option value="">Select</option>
                  <option>High School or below</option>
                  <option>Undergraduate</option>
                  <option>Postgraduate</option>
                  <option>PhD</option>
            </select>
            <p id="errEd"></p>
            <label for="account">Account Type:</label>
            <select name="account" id="account" class="form-select" onchange="valids()">
                  <option value="">Select</option>
                  <option>Checking Account</option>
                  <option>Saving Account</option>
                  <option>A Money Marketing A ccount</option>
                  <option>IRA Account</option>
            </select><p id="errAccount"></p>
            <label>Gender:</label>
            <div class="form-check">
                  <input class="form-check-input" type="radio" name="radioDefault" id="radioDefault1" onchange="valids()">
                  <label class="form-check-label" for="radioDefault1">
                  Male
                  </label>
                  </div>
            <div class="form-check">
                  <input class="form-check-input" type="radio" name="radioDefault" id="radioDefault2"onchange="valids()">
                  <label class="form-check-label" for="radioDefault2">
                  Female
                  </label>
            </div>
            <div class="form-check">
                  <input class="form-check-input" type="radio" name="radioDefault" id="radioDefault2" onchange="valids()">
                  <label class="form-check-label" for="radioDefault2">
                  Transgender
                  </label>
            </div><p id="errGender"></p>
            <label>Service required:</label>
            <div class="form-check">
                  <input class="form-check-input" type="checkbox" name="service" value="ATM Card" onchange="valids()">
                  <label class="form-check-label">
                  ATM card
                  </label>
            </div>
            <div class="form-check">
                  <input class="form-check-input" type="checkbox"  name="service" value="SMS Alerts" onchange="valids()">
                  <label class="form-check-label">
                 SMS alerts
                  </label>
            </div>
            <div class="form-check">
                  <input class="form-check-input" type="checkbox"  name="service" value="Net Banking" onchange="valids()">
                  <label class="form-check-label">
                 Net Banking
                  </label>
            </div>
            <div class="form-check">
                  <input class="form-check-input" type="checkbox" name="service" value="Checkbook" onchange="valids()">
                  <label class="form-check-label">
                 Checkbook
                  </label>
            </div><p id="errService"></p>
            <div class="form-group">
                  <label for="idProof">Upload ID Proof :</label>
                  <input type="file" id="idProof" class="form-control" onchange="valids()">
            </div><p id="errProof"></p>
            <div class="text-center mt-4">
                  <button type="submit" class="btn btn-submit px-4 py-2">Submit</button>
            </div>

      </div>
      <script src="/scriptjs/form.js"></script>
     </div>
      
            
</body>
</html>
